<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Training and Diet Tracker</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script defer src="script.js"></script></head><body><div class="container"> <nav class="sidebar"> <ul> <li><button class="sidebar-option active" data-option="training">Training</button></li> <li><button class="sidebar-option" data-option="diet">Diet</button></li> <li><button class="sidebar-option" data-option="analytics">Analytics</button></li> <li><button class="sidebar-option" data-option="settings">Settings</button></li> </ul> </nav> <div class="main-content"> <div id="training-content" class="content active"> <div class="training-log-container"> <h2>Training Log</h2> <form id="training-form"> <div class="form-group"> <label for="exercise_name">Exercise Name:</label> <input type="text" id="exercise_name" name="exercise_name" required><span id="exercise_name_error" class="error-message"></span> </div> <div class="form-group"> <label for="sets">Sets:</label> <input type="number" id="sets" name="sets" min="1" required><span id="sets_error" class="error-message"></span> </div> <div class="form-group"> <label for="reps">Reps:</label> <input type="number" id="reps" name="reps" min="1" required><span id="reps_error" class="error-message"></span> </div> <div class="form-group"> <label for="weight">Weight (kg/lbs):</label> <input type="number" id="weight" name="weight" min="0" step="0.1"><span id="weight_error" class="error-message"></span> </div> <button type="button" id="plus-button">+ Add More</button> <div id="additional-fields"></div> <div class="form-buttons"> <button type="submit" id="save-button">Save</button> <button type="button" id="clear-button">Clear</button> </div> </form> </div> </div> <div id="diet-content" class="content"> <h2>Diet Log</h2> <form id="diet-form"> <div class="form-group"> <label for="meal_name">Meal Name:</label> <input type="text" id="meal_name" name="meal_name" required><span id="meal_name_error" class="error-message"></span> </div> <div class="form-group"> <label for="calories">Calories:</label> <input type="number" id="calories" name="calories" min="0" required><span id="calories_error" class="error-message"></span> </div> <div class="form-group"> <label for="protein">Protein (g):</label> <input type="number" id="protein" name="protein" min="0" step="0.1"><span id="protein_error" class="error-message"></span> </div> <div class="form-group"> <label for="carbs">Carbs (g):</label> <input type="number" id="carbs" name="carbs" min="0" step="0.1"><span id="carbs_error" class="error-message"></span> </div> <div class="form-group"> <label for="fat">Fat (g):</label> <input type="number" id="fat" name="fat" min="0" step="0.1"><span id="fat_error" class="error-message"></span> </div> <div class="form-buttons"> <button type="button" id="save-diet-button">Save</button> <button type="button" id="clear-diet-button">Clear</button> </div> </form> </div> <div id="analytics-content" class="content"> <h2>Analytics</h2> <div id="training-summary"></div> <div id="diet-summary"></div> <div id="charts"> <canvas id="training-chart"></canvas> <canvas id="diet-chart"></canvas> </div> <div class="analytics-buttons"> <button id="export-data-btn">Export Data</button> <button id="clear-all-btn">Clear All Data</button> </div> </div> <div id="settings-content" class="content"> <h2>Settings</h2> <form id="settings-form"> <div class="form-group"> <label for="name">Name:</label> <input type="text" id="name" name="name"> </div> <div class="form-group"> <label for="birthday">Birthday:</label> <input type="date" id="birthday" name="birthday"> </div> <div class="form-group"> <label for="weight">Weight:</label> <input type="number" id="weight_settings" name="weight_settings" min="0" step="0.1"> </div> <div class="form-group"> <label for="height">Height:</label> <input type="number" id="height" name="height" min="0" step="0.1"> </div> <div class="form-group"> <label for="language">Language:</label> <select id="language" name="language"> <option value="english">English</option> <option value="spanish">Spanish</option> <option value="french">French</option> </select> </div> <button type="button" id="apply-changes-button">Apply Changes</button> </form> </div> </div> </div></body></html>
