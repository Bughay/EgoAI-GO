<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login Form</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body><div class="form-container"><form id="login-form"><h1 id="company-name">Ego AI</h1><h2 id="form-title">Login</h2><label for="username">Username:</label><input type="text" id="username" name="username" required><label for="password">Password:</label><input type="password" id="password" name="password" required><div id="registration-fields" style="display: none;"><div class="form-row"><label for="firstname">First Name:</label><input type="text" id="firstname" name="firstname"></div><div class="form-row"><label for="lastname">Last Name:</label><input type="text" id="lastname" name="lastname"></div><div class="form-row"><label for="email">Email:</label><input type="email" id="email" name="email"></div><div class="form-row"><label for="dateofbirth">Date of Birth:</label><input type="date" id="dateofbirth" name="dateofbirth"></div><div class="form-row"><label for="confirmpassword">Confirm Password:</label><input type="password" id="confirmpassword" name="confirmpassword"></div></div><button type="submit" id="submit-btn">Submit</button><button type="button" id="google-btn">Google Signin</button><button id="toggle-btn" type="button">Switch to Register</button></form></div><script src="script.js"></script></body></html>
