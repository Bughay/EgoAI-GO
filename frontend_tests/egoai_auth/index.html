<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="futuristic-bg"></div>
    <h1 id="egoai-text">EGOAI</h1>
    <div class="form-container">
        <div id="login-form">
            <h1>Login</h1>
            <form>
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" name="email" required>
                <label for="login-password">Password:</label>
                <input type="password" id="login-password" name="password" required>
                <button type="button" id="signin-btn">Sign In</button>
                <button type="button" id="register-btn">Register</button>
            </form>
        </div>
        <div id="registration-form" class="hidden">
            <h1>Register</h1>
            <form>
                <label for="reg-firstname">First Name:</label>
                <input type="text" id="reg-firstname" name="firstname" required>
                <label for="reg-lastname">Last Name:</label>
                <input type="text" id="reg-lastname" name="lastname" required>
                <label for="reg-email">Email:</label>
                <input type="email" id="reg-email" name="email" required>
                <label for="reg-password">Password:</label>
                <input type="password" id="reg-password" name="password" required>
                <label for="reg-confirmpassword">Confirm Password:</label>
                <input type="password" id="reg-confirmpassword" name="confirmpassword" required>
                <button type="button" id="submit-register-btn">Register</button>
                <button type="button" id="cancel-btn">Cancel</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
</html>
